<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAMZ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400&family=Space+Grotesk:wght@300;700&family=Inter:wght@400;600&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --jamz-bg: #ffffff;
            --jamz-card: #f9f9f9;
            --jamz-accent: #00ffcc; 
            --jamz-text: #121212;
            --jamz-dim: #999999;
            --jamz-border: rgba(0,0,0,0.1);
        }

        body {
            background: var(--jamz-bg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            font-family: 'Inter', sans-serif; color: var(--jamz-text);
        }

        .jamz-container {
            width: 330px; background: var(--jamz-card);
            padding: 15px; border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center;
            text-align: center; position: relative;
        }

        .search-wrap { width: 220px; margin-bottom: 12px; }
        #trackSearch {
            width: 100%; padding: 8px; border-radius: 12px; border: none;
            background: rgba(0, 0, 0, 0.03); font-size: 0.75rem; text-align: center; outline: none;
        }

        .jamz-artwork-wrap {
            width: 272px; height: 272px; margin-bottom: 15px;
            border-radius: 25px; overflow: hidden; background: #ffffff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            position: relative; display: flex; justify-content: center; align-items: center;
        }

        .jamz-artwork-wrap::after {
            content: 'music'; font-family: 'Bodoni Moda', serif; font-style: italic;
            color: #eeeeee; font-size: 1.5rem; letter-spacing: 3px; position: absolute;
        }

        #albumArt { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s; z-index: 1; }
        .img-loaded { opacity: 1 !important; }

        .jamz-info { margin-bottom: 5px; width: 100%; }
        .jamz-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.3rem; margin: 0; letter-spacing: -1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .jamz-artist { font-size: 0.85rem; color: var(--jamz-dim); margin-top: 2px; }

        .jamz-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        #playBtn {
            background: var(--jamz-text); width: 50px; height: 50px; border-radius: 50%;
            border: none; color: white; font-weight: 700; font-size: 0.6rem; cursor: pointer;
        }
        #playBtn.is-playing { background: var(--jamz-accent); color: var(--jamz-text); }
        .nav-btn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.75rem; color: var(--jamz-dim); border: none; background: none; cursor: pointer; }

        .progress-area { width: 100%; margin: 15px 0; }
        .bar-bg { width: 100%; height: 4px; background: #eee; border-radius: 10px; position: relative; cursor: pointer; }
        .bar-fill { height: 100%; width: 0%; background: var(--jamz-accent); border-radius: 10px; }

        .tools { display: flex; gap: 8px; margin-bottom: 12px; }
        .tool-btn {
            background: #fff; border: 1px solid #eee; padding: 5px 12px;
            border-radius: 20px; font-size: 0.6rem; font-weight: 700; cursor: pointer;
        }
        .tool-btn.active { background: var(--jamz-accent); border-color: var(--jamz-accent); }

        /* REFINED: THIN OUTLINE NEXT SONG BOX */
        .next-up-bar {
            width: 90%; 
            background: transparent;
            border: 1px solid var(--jamz-border); 
            border-radius: 15px;
            padding: 10px; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.3s ease;
        }

        .next-up-label { font-size: 0.5rem; font-weight: 800; text-transform: uppercase; color: var(--jamz-dim); display: block; }
        #nextSongName { font-size: 0.7rem; font-weight: 700; color: var(--jamz-text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* THE QUEUE CONTENT */
        .queue-content {
            display: none; height: 0; opacity: 0; overflow-y: auto; text-align: left;
            margin-top: 35px;
        }

        /* EXPANDED STATE (Simple & Solid) */
        .next-up-bar.expanded {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            width: calc(100% - 30px); height: 320px;
            background: #ffffff;
            z-index: 100; border: 1px solid var(--jamz-border);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.05); border-radius: 25px;
            cursor: default;
        }

        .next-up-bar.expanded .queue-content { display: block; height: 250px; opacity: 1; }
        .next-up-bar.expanded #nextSongName, .next-up-bar.expanded .next-up-label { display: none; }

        #closeQueue {
            display: none; position: absolute; top: 12px; right: 18px;
            font-size: 1.4rem; color: var(--jamz-dim); cursor: pointer;
        }
        .next-up-bar.expanded #closeQueue { display: block; }

        .track-item { padding: 12px 15px; border-bottom: 1px solid #f9f9f9; font-size: 0.8rem; cursor: pointer; }
        .track-item.active { color: var(--jamz-accent); font-weight: 700; }
    </style>
</head>
<body>

    <div class="jamz-container">
        <div class="search-wrap">
            <input type="text" id="trackSearch" placeholder="find a jam..." autocomplete="off">
        </div>

        <div class="jamz-artwork-wrap">
            <img src="" alt="" id="albumArt">
        </div>

        <div class="jamz-info">
            <h1 class="jamz-title" id="titleText">JAMZ</h1>
            <div id="artistText" class="jamz-artist">Tap Browse</div>
        </div>

        <div class="jamz-controls">
            <button id="prevBtn" class="nav-btn">PREV</button>
            <button id="playBtn">PLAY</button>
            <button id="nextBtn" class="nav-btn">NEXT</button>
        </div>

        <div class="progress-area">
            <div class="bar-bg" id="progressContainer"><div id="progressBar" class="bar-fill"></div></div>
        </div>

        <div class="tools">
            <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
            <button id="browseBtn" class="tool-btn">BROWSE</button>
            <button id="shuffleBtn" class="tool-btn">SHUFFLE: OFF</button>
            <button id="playlistBtn" class="tool-btn">PLAYLIST</button>
        </div>

        <div class="next-up-bar" id="queueTrigger">
            <span id="closeQueue">&times;</span>
            <span class="next-up-label">Next Song</span>
            <span id="nextSongName">None in queue</span>
            <div class="queue-content" id="queueList"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = new Audio();
            const playBtn = document.getElementById('playBtn');
            const fileInput = document.getElementById('fileInput');
            const albumArt = document.getElementById('albumArt');
            const queueTrigger = document.getElementById('queueTrigger');
            const closeQueue = document.getElementById('closeQueue');
            const nextSongDisplay = document.getElementById('nextSongName');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const progressBar = document.getElementById('progressBar');
            
            let playlist = [];
            let currentIndex = 0;
            let isShuffle = false;

            const openQueue = () => queueTrigger.classList.add('expanded');
            const closeQueueBox = (e) => { if(e) e.stopPropagation(); queueTrigger.classList.remove('expanded'); };

            document.getElementById('playlistBtn').onclick = (e) => { e.stopPropagation(); openQueue(); };
            queueTrigger.onclick = (e) => { if(!queueTrigger.classList.contains('expanded')) openQueue(); };
            closeQueue.onclick = closeQueueBox;

            shuffleBtn.onclick = () => {
                isShuffle = !isShuffle;
                shuffleBtn.textContent = isShuffle ? "SHUFFLE: ON" : "SHUFFLE: OFF";
                shuffleBtn.classList.toggle('active');
            };

            fileInput.onchange = (e) => {
                playlist = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav|m4a)$/i));
                if (playlist.length > 0) { renderQueue(); loadTrack(0); }
            };

            function renderQueue() {
                const list = document.getElementById('queueList');
                list.innerHTML = "";
                playlist.forEach((file, idx) => {
                    const div = document.createElement('div');
                    div.className = 'track-item' + (idx === currentIndex ? ' active' : '');
                    div.textContent = file.name.replace(/\.[^/.]+$/, "");
                    div.onclick = (e) => { e.stopPropagation(); loadTrack(idx); closeQueueBox(); };
                    list.appendChild(div);
                });
                let nextIdx = (currentIndex + 1) % playlist.length;
                nextSongDisplay.textContent = playlist[nextIdx] ? playlist[nextIdx].name.replace(/\.[^/.]+$/, "") : "End of list";
            }

            function loadTrack(index) {
                if (playlist.length === 0) return;
                currentIndex = (index + playlist.length) % playlist.length;
                const file = playlist[currentIndex];
                audio.src = URL.createObjectURL(file);
                albumArt.classList.remove('img-loaded');

                jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        document.getElementById('titleText').textContent = file.name.replace(/\.[^/.]+$/, "");
                        document.getElementById('artistText').textContent = tag.tags.artist || "Unknown Artist";
                        const img = tag.tags.picture;
                        if (img) {
                            let base = "";
                            for (let i = 0; i < img.data.length; i++) base += String.fromCharCode(img.data[i]);
                            albumArt.src = "data:" + img.format + ";base64," + window.btoa(base);
                        } else { albumArt.src = ''; }
                        setTimeout(() => albumArt.classList.add('img-loaded'), 100);
                        renderQueue();
                    },
                    onError: () => {
                        document.getElementById('titleText').textContent = file.name.replace(/\.[^/.]+$/, "");
                        document.getElementById('artistText').textContent = "Unknown Artist";
                        albumArt.src = '';
                        renderQueue();
                    }
                });
                audio.play();
            }

            // FIXED SHUFFLE LOGIC
            function nextTrack() {
                if (playlist.length === 0) return;
                if (isShuffle && playlist.length > 1) {
                    let newIndex;
                    do { newIndex = Math.floor(Math.random() * playlist.length); } 
                    while (newIndex === currentIndex);
                    loadTrack(newIndex);
                } else {
                    loadTrack(currentIndex + 1);
                }
            }

            audio.ontimeupdate = () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = pct + "%";
            };
            document.getElementById('progressContainer').onclick = (e) => {
                const pct = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth;
                audio.currentTime = pct * audio.duration;
            };

            audio.onended = () => nextTrack();
            playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
            audio.onplay = () => { playBtn.textContent = "PAUSE"; playBtn.classList.add('is-playing'); };
            audio.onpause = () => { playBtn.textContent = "PLAY"; playBtn.classList.remove('is-playing'); };
            
            // Buttons now follow the same fixed logic
            document.getElementById('nextBtn').onclick = () => nextTrack();
            document.getElementById('prevBtn').onclick = () => loadTrack(currentIndex - 1);
            document.getElementById('browseBtn').onclick = () => fileInput.click();
        });
    </script>
</body>
  </html>
